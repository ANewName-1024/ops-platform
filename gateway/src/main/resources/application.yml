spring:
  application:
    name: gateway
  main:
    allow-bean-definition-overriding: true
  web:
    resources:
      static-locations: classpath:/static/
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: localhost:8848
      config:
        import-check:
          enabled: false
    gateway:
      server:
        webflux:
          routes:
            # 用户服务
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/user/**
              filters:
                - StripPrefix=0
            
            # OPS 运维服务
            - id: ops-service
              uri: http://localhost:8083
              predicates:
                - Path=/ops/**
              filters:
                - StripPrefix=0
            
            # 知识库服务
            - id: knowledge-service
              uri: http://localhost:8092
              predicates:
                - Path=/knowledge/**
              filters:
                - StripPrefix=0
            
            # 工作流服务
            - id: workflow-service
              uri: http://127.0.0.1:8091
              predicates:
                - Path=/workflow
                - Path=/workflow/**
              filters:
                - StripPrefix=0
            
            # 知识库服务
            - id: knowledge-service
              uri: http://localhost:8092
              predicates:
                - Path=/knowledge/**
              filters:
                - StripPrefix=0
            
            # 通知服务
            - id: notification-service
              uri: http://127.0.0.1:8094
              predicates:
                - Path=/notification
                - Path=/notification/**
              filters:
                - StripPrefix=0
            
            # 对话服务
            - id: chat-service
              uri: http://localhost:8093
              predicates:
                - Path=/chat/**
              filters:
                - StripPrefix=0
            
            # 前端静态资源
            - id: frontend-static
              uri: classpath:/static/
              predicates:
                - Path=/**
              filters:
                - RewritePath=/(?<segment>.*), /{segment}

      # 全局 CORS 配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_ADDRESS:0.0.0.0}

jwt:
  secret: ${JWT_SECRET:GatewayJWTSecretKey2024ChangeInProduction}
  expiration: 1800000
  exclude-paths: /ops/auth/login,/user/auth/login,/user/auth/register,/actuator/**,/auth/login

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
