server:
  port: 8093
  address: 0.0.0.0

spring:
  application:
    name: chat-service
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: localhost:8848
  datasource:
    url: jdbc:postgresql://8.137.116.121:8432/business_db
    username: business
    password: NewPass2024
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:ChatServiceJWTSecretKey2024}
  expiration: 86400000

# LLM 配置
llm:
  enabled: false
  provider: openai
  api:
    key: ${LLM_API_KEY:}
    endpoint: ${LLM_API_ENDPOINT:https://api.openai.com/v1}
  model: ${LLM_MODEL:gpt-3.5-turbo}
  temperature: 0.7
  max_tokens: 2000

logging:
  level:
    com.example.chat: INFO
